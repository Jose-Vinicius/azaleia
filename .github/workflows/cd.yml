name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  build:
    name: Build e Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Converter repositório para minúsculas
        id: repo
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}:latest

  deploy:
    name: Deploy na VPS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v7
      
      - name: Converter repositório para minúsculas
        id: repo
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Copiar arquivos de configuração
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: "~/azaleia"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/azaleia
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin
            export DOCKER_IMAGE=ghcr.io/${{ steps.repo.outputs.name }}:latest
            docker compose pull
            docker compose run --rm web bin/rails db:prepare
            docker compose up -d
            
            echo "Verificando se a aplicação subiu corretamente..."
            for i in {1..12}; do
              if curl -s -f http://localhost/up > /dev/null; then
                echo "Deploy concluído com sucesso e aplicação saudável!"
                docker image prune -f
                exit 0
              fi
              echo "Aguardando aplicação responder (tentativa $i/12)..."
              sleep 10
            done
            
            echo "Erro: Aplicação não ficou saudável a tempo!"
            docker compose logs --tail=50 web
            exit 1

      - name: Notificar no Discord
        if: always()
        run: |
          EMOJI="✅"
          STATUS="Sucesso"
          if [ "${{ job.status }}" != "success" ]; then
            EMOJI="🚨"
            STATUS="Falha"
          fi
          
          PAYLOAD=$(cat <<EOF
          {
            "content": null,
            "embeds": [
              {
                "title": "$EMOJI Deploy na VPS: $STATUS",
                "description": "**Repositório:** ${{ github.repository }}\\\\n**Branch:** main\\\\n**Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})",
                "color": $(if [ "${{ job.status }}" == "success" ]; then echo "3066993"; else echo "15158332"; fi)
              }
            ]
          }
          EOF
          )
          
          curl -H "Content-Type: application/json" -d "$PAYLOAD" ${{ secrets.DISCORD_WEBHOOK_URL }}